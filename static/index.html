<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralSafety | Enterprise RAG Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default Dark Theme */
            --bg-color: #131314;
            --sidebar-bg: #1e1e1e;
            --text-primary: #e3e3e3;
            --text-secondary: #9aa0a6;
            --accent-color: #8ab4f8;
            --accent-bg: rgba(138, 180, 248, 0.1);
            --border-color: #333333;
            --user-bubble: #2d2e30;
            --bot-bubble: transparent;
            --input-bg: #1e1e1e;
            --shadow: 0 4px 15px rgba(0,0,0,0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme {
            --bg-color: #f0f4f9;
            --sidebar-bg: #f9f9f9;
            --text-primary: #1f1f1f;
            --text-secondary: #5f6368;
            --accent-color: #1a73e8;
            --accent-bg: rgba(26, 115, 232, 0.1);
            --border-color: #e0e0e0;
            --user-bubble: #e8f0fe;
            --bot-bubble: transparent;
            --input-bg: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            transition: background-color 0.3s;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            z-index: 100;
            position: relative;
        }

        .sidebar.collapsed {
            width: 0;
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar-content {
            padding: 1rem;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .nav-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }

        .control-item {
            margin-bottom: 1rem;
        }

        select, input.side-input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            outline: none;
            transition: var(--transition);
        }

        select:hover, input.side-input:hover {
            background: var(--accent-bg);
        }

        .sync-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .sync-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* --- Main Chat Area --- */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .top-bar {
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-color);
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: var(--accent-bg);
            color: var(--accent-color);
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
        }

        .message-container {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .message {
            padding: 0.5rem 0;
            line-height: 1.75;
            font-size: 1rem;
            max-width: 100%;
        }

        .user-message-wrapper {
            align-self: flex-end;
            max-width: 80%;
            background: var(--user-bubble);
            padding: 0.8rem 1.2rem;
            border-radius: 18px 18px 4px 18px;
            margin-bottom: 0.5rem;
        }

        .bot-message-wrapper {
            align-self: flex-start;
            width: 100%;
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: var(--accent-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        /* --- Floating Input Area --- */
        .input-area {
            padding: 1rem 2rem 2rem 2rem;
            background: linear-gradient(transparent, var(--bg-color) 40%);
        }

        .input-pill {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 8px 16px;
            display: flex;
            align-items: flex-end;
            box-shadow: var(--shadow);
            transition: border-color 0.3s;
        }

        .input-pill:focus-within {
            border-color: var(--accent-color);
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 10px 12px;
            font-size: 1rem;
            outline: none;
            resize: none;
            max-height: 200px;
            min-height: 24px;
            line-height: 1.5;
            font-family: inherit;
        }

        .send-btn {
            background: var(--accent-color);
            border: none;
            color: var(--bg-color);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 4px;
            transition: var(--transition);
            opacity: 0.5;
            pointer-events: none;
        }

        .send-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        /* --- Components & Markdown --- */
        .bot-message h3 {
            color: var(--accent-color);
            margin: 1rem 0 0.5rem 0;
            font-size: 1.1rem;
            line-height: 1.3;
        }

        .bot-message strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .bot-message li {
            margin-left: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .bot-message br {
            display: block;
            margin: 0.5rem 0;
            content: "";
        }

        .meta-badge {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 1rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- Loading --- */
        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 1rem 0;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                NeuralSafety
            </div>
        </div>
        
        <div class="sidebar-content">
            <div class="control-group">
                <div class="nav-label">Base de Conhecimento</div>
                <div class="control-item">
                    <select id="collection-select">
                        <option value="market_ebay_strict" selected>eBay - Strict (E-commerce)</option>
                        <option value="finlandia_strict">Finlândia - Strict (Economia)</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <div class="nav-label">Session ID</div>
                <div class="control-item">
                    <input type="text" id="session-id" class="side-input" value="browser_session_01">
                </div>
            </div>

            <div class="control-group" style="margin-top: auto;">
                <div class="nav-label">NeuralSync (URL)</div>
                <input type="text" id="sync-url" class="side-input" placeholder="https://..." style="margin-bottom: 0.5rem;">
                <button class="sync-btn" onclick="syncURL()">Sincronizar Fonte</button>
            </div>

            <div style="margin-top: 1rem; color: var(--text-secondary); font-size: 0.65rem; text-align: center;">
                v2.0.1 | Memory Window: 6
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-chat">
        <div class="top-bar">
            <div style="display: flex; gap: 0.5rem;">
                <button class="icon-btn" id="toggle-sidebar" title="Toggle Sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
            </div>
            
            <div style="display: flex; gap: 0.5rem;">
                <button class="icon-btn" id="toggle-theme" title="Switch Theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
                <div class="status-badge" style="font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 99px; background: var(--accent-bg); color: var(--accent-color); display: flex; align-items: center; gap: 0.4rem;">
                    <div class="status-dot" style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e;"></div>
                    Enterprise RAG Active
                </div>
            </div>
        </div>

        <div id="chat-messages">
            <!-- Messages go here -->
            <div class="message-container bot-message-wrapper">
                <div class="message-avatar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                <div class="message bot-message">
                    Olá! Sou o agente <strong>NeuralSafety</strong>. Como posso ajudar com sua base de dados hoje?
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-pill">
                <textarea id="user-input" placeholder="Pergunte algo sobre seus documentos..." rows="1"></textarea>
                <button class="send-btn" id="send-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
            <div style="text-align: center; font-size: 0.65rem; color: var(--text-secondary); margin-top: 0.75rem;">
                NeuralSafety | Socrative AI Core | Grounding Ativo
            </div>
        </div>
    </main>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const collectionSelect = document.getElementById('collection-select');
        const sessionIdInput = document.getElementById('session-id');
        const sidebar = document.getElementById('sidebar');
        const toggleSidebar = document.getElementById('toggle-sidebar');
        const toggleTheme = document.getElementById('toggle-theme');

        // --- Sidebar & Theme Logic ---
        toggleSidebar.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });

        toggleTheme.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });

        // Restore Theme
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }

        // --- Auto-grow Textarea ---
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
            
            if (userInput.value.trim().length > 0) {
                sendBtn.classList.add('active');
            } else {
                sendBtn.classList.remove('active');
            }
        });

        function createMessageWrapper(role) {
            const container = document.createElement('div');
            container.className = `message-container ${role === 'user' ? 'user-message-wrapper' : 'bot-message-wrapper'}`;
            
            if (role === 'bot') {
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>';
                container.appendChild(avatar);
            }
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
            container.appendChild(msgDiv);
            
            chatMessages.appendChild(container);
            return msgDiv;
        }

        function addMessage(text, role) {
            const msgDiv = createMessageWrapper(role);
            msgDiv.innerHTML = formatMD(text);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.classList.remove('active');

            const botMsgDiv = createMessageWrapper('bot');
            botMsgDiv.innerHTML = '<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            let fullText = "";

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionIdInput.value,
                        message: text,
                        collection: collectionSelect.value
                    })
                });

                if (!response.ok) throw new Error("Falha na API");

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                botMsgDiv.innerHTML = ""; 

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    
                    // Detectar Status (Não adiciona ao fullText)
                    if (chunk.includes("[STATUS]")) {
                        const statusText = chunk.split("[STATUS]|")[1];
                        botMsgDiv.innerHTML = `<div style="display: flex; align-items: center; gap: 8px; color: var(--accent-color); font-size: 0.85rem; font-style: italic; opacity: 0.8;">
                            <div class="dot" style="background: var(--accent-color); width: 6px; height: 6px;"></div> 
                            ${statusText}
                        </div>`;
                        continue;
                    }

                    if (chunk.includes("[NEURAL_META]")) {
                        const parts = chunk.split("[NEURAL_META]|");
                        fullText += parts[0]; 
                        
                        const meta = parts[1].split("|");
                        const timeMs = meta[0];
                        const collection = meta[1];
                        const source = meta[2] || "Desconhecido";
                        
                        botMsgDiv.innerHTML = formatMD(fullText);

                        const badge = document.createElement('div');
                        badge.className = 'meta-badge';
                        badge.innerHTML = `⚡ Latência Zero: ${timeMs}ms | Fonte: ${source} | Coleção: ${collection}`;
                        botMsgDiv.appendChild(badge);
                        break;
                    }

                    fullText += chunk;
                    botMsgDiv.innerHTML = formatMD(fullText);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            } catch (err) {
                botMsgDiv.innerHTML = "Erro ao processar resposta: " + err.message;
            }
        }

        function formatMD(text) {
            return text
                .replace(/### (.*?)\n/g, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/^\- (.*?)$/gm, '<li>$1</li>')
                .replace(/\n\n/g, '<br>')
                .replace(/\n/g, '<br>')
                .replace(/<\/li><br><li>/g, '</li><li>');
        }

        async function syncURL() {
            const url = document.getElementById('sync-url').value;
            if (!url) return alert("Insira uma URL");
            
            const btn = document.querySelector('.sync-btn');
            btn.innerHTML = "Sincronizando...";
            btn.disabled = true;

            try {
                const response = await fetch('/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                const data = await response.json();
                alert(data.message || data.error);
            } catch (err) {
                alert("Erro na sincronização");
            } finally {
                btn.innerHTML = "Sincronizar Fonte";
                btn.disabled = false;
            }
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        async function loadCollections() {
            try {
                const response = await fetch('/collections');
                const data = await response.json();
                const selector = document.getElementById('collection-select');
                
                // Pega os valores que já existem no HTML estático
                const existingValues = Array.from(selector.options).map(opt => opt.value);
                
                data.collections.forEach(col => {
                    if (!existingValues.includes(col)) {
                        const opt = document.createElement('option');
                        opt.value = col;
                        opt.text = `${col.startsWith('sync_') ? col.replace('sync_', '⚡ ') : col}`;
                        selector.appendChild(opt);
                    }
                });
            } catch (err) {
                console.error('Erro ao carregar coleções:', err);
            }
        }

        // Carrega ao iniciar
        loadCollections();

        // --- NeuralSync Logic ---
        const syncBtn = document.getElementById('sync-btn');
        const syncUrl = document.getElementById('sync-url');
        const syncColl = document.getElementById('sync-collection');
        const syncStatus = document.getElementById('sync-status');

        syncBtn.addEventListener('click', async () => {
            const url = syncUrl.value.trim();
            if (!url) return;

            syncBtn.disabled = true;
            syncStatus.style.display = 'block';
            syncStatus.innerText = 'NeuralSync operando... Aguarde a clonagem matemática. 🌀';

            try {
                const response = await fetch('/ingest/url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: url,
                        collection_name: syncColl.value.trim() || null,
                        strict: true
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    syncStatus.innerText = `Otimização concluída! Coleção: ${data.collection} ✅`;
                    // Adiciona a nova coleção ao seletor (agora de forma verídica)
                    const selector = document.getElementById('collection-select');
                    const exists = Array.from(selector.options).some(opt => opt.value === data.collection);
                    if (!exists) {
                        const opt = document.createElement('option');
                        opt.value = data.collection;
                        opt.text = `${data.collection} (Sincronizado)`;
                        selector.appendChild(opt);
                        // Auto-seleciona a nova coleção recém-criada
                        selector.value = data.collection;
                    }
                    setTimeout(() => {
                        syncStatus.style.display = 'none';
                        syncBtn.disabled = false;
                        syncUrl.value = '';
                    }, 8000); // 8s de celebração na UI
                } else {
                    syncStatus.innerText = `Falha na clonagem: ${data.detail || 'Erro desconhecido'} ❌`;
                    syncBtn.disabled = false;
                }
            } catch (err) {
                syncStatus.innerText = 'Erro crítico de conexão com o Motor Neural. 🚫';
                syncBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
